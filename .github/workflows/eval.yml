name: Lumina Evaluation Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit Tests + Typecheck (runs on every push) ─────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run rebuild:native

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests (350 tests — all must pass)
        run: npm test

  # ── Golden Gate Scenarios (Phase 10 — deterministic, no LLM) ───────────────
  eval-gates:
    name: Golden Gate Scenarios
    runs-on: macos-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild:native

      - name: Run golden gate scenarios (10 scenarios — all must pass)
        run: npm test -- tests/unit/eval.gates.test.ts

  # ── RAGAS + DeepEval Pipeline (Phase 10 — LLM-dependent, main branch only) ─
